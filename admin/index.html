<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración | La Especie</title>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <!-- Decap CMS CDN Script -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Custom preview template for articles to prevent React Error #130 crashes
      CMS.registerPreviewTemplate("posts", ({ entry, widgetFor }) => {
        const title = entry.getIn(['data', 'title']) || 'Sin Título';
        const author = entry.getIn(['data', 'author']) || 'La Especie';
        const date = entry.getIn(['data', 'date']) || '';
        const image = entry.getIn(['data', 'image']);
        const image_caption = entry.getIn(['data', 'image_caption']);
        
        return h('div', { style: { padding: '20px', fontFamily: 'sans-serif', lineHeight: '1.6', color: '#333' } },
          h('span', { style: { textTransform: 'uppercase', fontSize: '0.75rem', fontWeight: 'bold', color: '#e11d48' } }, 'Previsualización'),
          h('h1', { style: { fontSize: '2rem', marginTop: '10px', marginBottom: '10px', fontFamily: 'Georgia, serif' } }, title),
          h('div', { style: { color: '#666', fontSize: '0.85rem', marginBottom: '20px' } }, 
            h('span', {}, 'Por '),
            h('strong', {}, author),
            date ? h('span', {}, ' | ' + new Date(date).toLocaleDateString('es-ES')) : null
          ),
          image ? h('div', { style: { marginBottom: '20px' } },
            h('img', { src: image, style: { width: '100%', maxHeight: '400px', objectFit: 'cover', borderRadius: '4px' } }),
            image_caption ? h('p', { style: { fontSize: '0.8rem', color: '#666', fontStyle: 'italic', marginTop: '5px', textAlign: 'right' } }, image_caption) : null
          ) : null,
          h('hr', { style: { border: 'none', borderTop: '1px solid #eee', marginBottom: '20px' } }),
          h('div', { style: { fontSize: '1rem', color: '#222' } }, widgetFor('body'))
        );
      });
    </script>
</body>
</html>
